<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Throw Trash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h2>Throw Trash</h2>
        <div class="score-board">Score: <span id="score">0</span></div>

   
        <div class="garbage-zone" id="garbageZone">

        </div>

      
        <div class="bin-zone">
            <div class="bin" data-type="organic" id="organicBin">
                <img src="imgs/organic.png" alt="Organic Bin">
            </div>
            <div class="bin" data-type="paper" id="paperBin">
                <img src="imgs/paperdustbin.png" alt="Paper Bin">
            </div>
            <div class="bin" data-type="plastic" id="plasticBin">
                <img src="imgs/plastic.png" alt="Plastic Bin">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
